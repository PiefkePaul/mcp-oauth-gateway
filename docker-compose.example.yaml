services:
  mcp-oauth-gateway:
    image: your-dockerhub-user/mcp-oauth-gateway:latest
    container_name: mcp-oauth-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MCP_GATEWAY_PUBLIC_BASE_URL: "https://mcp.example.com"
      MCP_GATEWAY_LISTEN_ADDR: ":8080"
      MCP_GATEWAY_ROUTES_PATH: "/config/routes.yaml"
      MCP_GATEWAY_AUTH_STORE_PATH: "/data/auth-store.enc"
      MCP_GATEWAY_AUTH_MASTER_KEY: "REPLACE_WITH_32_BYTE_BASE64_OR_HEX_KEY"
      MCP_GATEWAY_ACCOUNT_TITLE: "Example MCP Gateway"
      MCP_GATEWAY_ALLOW_SELF_SIGNUP: "false"
      MCP_GATEWAY_ACCESS_LOG: "false"
      MCP_GATEWAY_BOOTSTRAP_EMAIL: "admin@example.com"
      MCP_GATEWAY_BOOTSTRAP_PASSWORD: "REPLACE_WITH_LONG_RANDOM_PASSWORD"
      MCP_GATEWAY_ALLOWED_EMAIL_DOMAINS: "example.com"
      # Optional: only needed when a client such as Open WebUI registers a non-HTTPS,
      # non-loopback redirect URI, for example in a private LAN test setup.
      # Prefer setting Open WebUI's WEBUI_URL to its public HTTPS URL instead.
      MCP_GATEWAY_ALLOWED_REDIRECT_ORIGINS: ""
      # Optional: enable only if the gateway should create/start/stop Docker containers.
      # Mounting docker.sock grants this container host-level Docker control.
      MCP_GATEWAY_DOCKER_MANAGEMENT_ENABLED: "false"
      MCP_GATEWAY_DOCKER_HOST: "unix:///var/run/docker.sock"
      MCP_GATEWAY_DOCKER_NETWORKS: "mcp-internal"
      # Optional: allow admins to build a minimal image from a verified binary artifact.
      # Requires Docker management and docker.sock access.
      MCP_GATEWAY_BUILD_ENABLED: "false"
      MCP_GATEWAY_BUILD_MAX_ARTIFACT_MB: "100"
      MCP_GATEWAY_BUILD_ALLOWED_DOWNLOAD_HOSTS: "github.com,objects.githubusercontent.com,github-releases.githubusercontent.com,release-assets.githubusercontent.com"
      MCP_GATEWAY_BUILD_DEFAULT_BASE_IMAGE: "debian:bookworm-slim"
      MCP_GATEWAY_BUILD_ALLOWED_BASE_IMAGES: "debian:bookworm-slim"
      MCP_GATEWAY_OPENAPI_STORE_DIR: "/data/openapi"
    volumes:
      - ./config:/config
      - ./data:/data
      # Optional: native STDIO MCP executables made available to the gateway.
      # - ./tools:/tools:ro
      # Required only when MCP_GATEWAY_DOCKER_MANAGEMENT_ENABLED=true:
      # - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - reverse-proxy
      - mcp-internal

  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: n8n-mcp
    restart: unless-stopped
    environment:
      MCP_MODE: "http"
      PORT: "8080"
      AUTH_TOKEN: "REPLACE_WITH_INTERNAL_N8N_AUTH_TOKEN"
    expose:
      - "8080"
    networks:
      - mcp-internal

  portainer-mcp:
    image: your-dockerhub-user/portainer-mcp-http:latest
    container_name: portainer-mcp
    restart: unless-stopped
    environment:
      PORTAINER_TOKEN: "REPLACE_WITH_PORTAINER_TOKEN"
      PORTAINER_SERVER: "https://portainer:9443"
      MCP_TRANSPORT: "http"
      MCP_HTTP_LISTEN_ADDR: ":8080"
      DISABLE_VERSION_CHECK: "true"
      READ_ONLY: "false"
    expose:
      - "8080"
    volumes:
      - ./portainer-mcp-data:/data
    networks:
      - mcp-internal

  camoufox-mcp:
    image: your-registry/camoufox-mcp:latest
    container_name: camoufox-mcp
    restart: unless-stopped
    environment:
      MCP_TRANSPORT: "http"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "3000"
      MCP_PATH: "/mcp"
      MCP_HEALTH_PATH: "/health"
      MCP_AUTH_TOKEN: "REPLACE_WITH_INTERNAL_CAMOUFOX_AUTH_TOKEN"
    expose:
      - "3000"
    networks:
      - mcp-internal

networks:
  reverse-proxy:
    external: true
  mcp-internal:
    driver: bridge
