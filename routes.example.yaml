routes:
  - id: n8n
    display_name: n8n MCP
    path_prefix: /n8n
    upstream: http://n8n-mcp:8080
    upstream_mcp_path: /mcp
    scopes_supported:
      - mcp
    access:
      visibility: public
      mode: public
    forward_headers:
      Authorization: "Bearer REPLACE_WITH_INTERNAL_N8N_AUTH_TOKEN"

  - id: portainer
    display_name: Portainer MCP
    path_prefix: /portainer
    upstream: http://portainer-mcp:8080
    upstream_mcp_path: /mcp
    scopes_supported:
      - mcp
    access:
      visibility: private
      mode: admin
    deployment:
      type: docker
      managed: true
      image: your-dockerhub-user/portainer-mcp-http:latest
      container_name: portainer-mcp
      internal_port: 8080
      networks:
        - mcp-internal
      restart_policy: unless-stopped

  - id: camoufox
    display_name: Camoufox MCP
    path_prefix: /camoufox
    upstream: http://camoufox-mcp:3000
    upstream_mcp_path: /mcp
    scopes_supported:
      - mcp
    access:
      visibility: public
      mode: restricted
      allowed_groups:
        - Browser Team
    forward_headers:
      Authorization: "Bearer REPLACE_WITH_INTERNAL_CAMOUFOX_AUTH_TOKEN"

  - id: local-stdio
    display_name: Local STDIO MCP
    transport: stdio
    path_prefix: /local-stdio
    scopes_supported:
      - mcp
    access:
      visibility: private
      mode: admin
    stdio:
      command: /tools/example-mcp
      args:
        - --stdio
      env:
        EXAMPLE_SECRET: REPLACE_WITH_SECRET
      # Routes created by the STDIO installer store secret values encrypted
      # in auth-store.enc and persist only references here, for example:
      # env_secret_refs:
      #   EXAMPLE_SECRET: route:local-stdio:env:EXAMPLE_SECRET
      working_dir: /tools

  - id: example-openapi
    display_name: Example OpenAPI Tools
    transport: openapi
    path_prefix: /example-openapi
    scopes_supported:
      - mcp
    access:
      visibility: private
      mode: restricted
      allowed_groups:
        - API Team
    openapi:
      spec_path: /data/openapi/example.yaml
      base_url: https://api.example.com
      headers:
        Authorization: "Bearer REPLACE_WITH_INTERNAL_API_TOKEN"
      timeout_seconds: 30
